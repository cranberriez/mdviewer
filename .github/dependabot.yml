version: 2
updates:
  # Frontend dependencies (pnpm / npm ecosystem)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      lexical:
        patterns:
          - "@lexical/*"
          - "lexical"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      tauri-js:
        patterns:
          - "@tauri-apps/*"
    labels:
      - dependencies
      - javascript

  # Rust backend dependencies
  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - rust

  # GitHub Actions used by the workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
