version: 2
updates:
  # Frontend dependencies (pnpm / npm ecosystem)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript
    groups:
      # One PR for all safe (minor + patch) frontend updates.
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      # Major bumps stay grouped by library family so breaking changes are
      # reviewed together but separately from the safe batch.
      lexical:
        patterns:
          - "@lexical/*"
          - "lexical"
        update-types:
          - major
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - major
      tauri-js:
        patterns:
          - "@tauri-apps/*"
        update-types:
          - major

  # Rust backend dependencies
  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
    groups:
      cargo-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # GitHub Actions used by the workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    groups:
      actions-all:
        patterns:
          - "*"
