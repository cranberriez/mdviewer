name: Build and Release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-and-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-context:
    name: Show run context
    runs-on: ubuntu-latest

    steps:
      - name: Write run context
        run: |
          {
            echo "## Build and Release context"
            echo ""
            echo "- Event: ${{ github.event_name }}"
            echo "- Ref: ${{ github.ref }}"
            echo "- Ref name: ${{ github.ref_name }}"
            echo "- SHA: ${{ github.sha }}"
            echo "- Release tag: ${{ github.event.release.tag_name || '' }}"
          } >> "$GITHUB_STEP_SUMMARY"

  validate:
    name: Validate frontend
    if: ${{ github.event_name != 'release' && !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

  windows-artifact:
    name: Build Windows artifact
    if: ${{ !cancelled() && (github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && needs.validate.result == 'success')) }}
    needs:
      - run-context
      - validate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}-${{ hashFiles('src-tauri/src/**', 'src-tauri/Cargo.toml', 'src-tauri/build.rs', 'src-tauri/tauri.conf.json') }}
          restore-keys: |
            windows-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}-
            windows-cargo-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        run: pnpm bundle

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v7
        with:
          name: mdviewer-windows-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  github-release:
    name: Publish GitHub release
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v')) }}
    needs:
      - run-context
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}-${{ hashFiles('src-tauri/src/**', 'src-tauri/Cargo.toml', 'src-tauri/build.rs', 'src-tauri/tauri.conf.json') }}
          restore-keys: |
            windows-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}-
            windows-cargo-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check release version
        run: pnpm check:release-version ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          tagName: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          releaseName: MDViewer ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          releaseBody: Windows installer build for MDViewer.
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: ${{ github.event_name == 'release' && github.event.release.prerelease || contains(github.ref_name, '-') }}
          releaseAssetNamePattern: MDViewer-[version]-[platform]-[arch][setup][ext]
