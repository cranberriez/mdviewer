name: Version and Release

# Two paths, both driven by a merged pull request:
#
#   1. Feature branch -> integration branch (vX.Y):
#        bump the patch version and commit it back to the integration branch.
#
#   2. Integration branch (vX.Y[.Z]) -> main:
#        read the accumulated version, tag it vX.Y.Z, and hand off to the
#        reusable Release workflow which builds, attests, and publishes.

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Path 1: bump patch when a feature branch merges into a vX.Y branch
  # ---------------------------------------------------------------------------
  bump-version:
    name: Bump patch version
    if: >
      github.event.pull_request.merged == true &&
      github.base_ref != 'main' &&
      github.event.pull_request.head.ref != 'main' &&
      startsWith(github.base_ref, 'v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine new version
        id: version
        run: |
          TARGET_BRANCH="${{ github.base_ref }}"
          CURRENT=$(grep -m1 '"version"' package.json | sed 's/.*"version": *"\([^"]*\)".*/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [[ "$TARGET_BRANCH" =~ ^v([0-9]+)\.([0-9]+)(\.([0-9]+))?$ ]]; then
            BRANCH_MAJOR="${BASH_REMATCH[1]}"
            BRANCH_MINOR="${BASH_REMATCH[2]}"
            BRANCH_PATCH="${BASH_REMATCH[4]}"
            if [[ -n "$BRANCH_PATCH" ]]; then
              MAJOR="$BRANCH_MAJOR"
              MINOR="$BRANCH_MINOR"
              PATCH=$((BRANCH_PATCH + 1))
            elif [[ "$BRANCH_MAJOR" != "$MAJOR" || "$BRANCH_MINOR" != "$MINOR" ]]; then
              # Moved to a new major.minor branch; start its patch series at 0
              MAJOR="$BRANCH_MAJOR"
              MINOR="$BRANCH_MINOR"
              PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
          else
            PATCH=$((PATCH + 1))
          fi
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW_VERSION"  >> "$GITHUB_OUTPUT"

      - name: Update version files
        run: |
          CURRENT="${{ steps.version.outputs.current }}"
          NEW="${{ steps.version.outputs.new }}"

          # package.json — first "version" field only
          sed -i "0,/\"version\": *\"$CURRENT\"/s/\"version\": *\"$CURRENT\"/\"version\": \"$NEW\"/" package.json

          # Cargo.toml — first bare version = "..." line
          sed -i "0,/^version = \"$CURRENT\"/s/^version = \"$CURRENT\"/version = \"$NEW\"/" src-tauri/Cargo.toml

          # tauri.conf.json — first "version" field only
          sed -i "0,/\"version\": *\"$CURRENT\"/s/\"version\": *\"$CURRENT\"/\"version\": \"$NEW\"/" src-tauri/tauri.conf.json

      - name: Verify all three files agree
        run: |
          NEW="${{ steps.version.outputs.new }}"
          PKG=$(grep -m1 '"version"' package.json | sed 's/.*"version": *"\([^"]*\)".*/\1/')
          CARGO=$(grep -m1 '^version' src-tauri/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          TAURI=$(grep -m1 '"version"' src-tauri/tauri.conf.json | sed 's/.*"version": *"\([^"]*\)".*/\1/')

          if [[ "$PKG" != "$NEW" || "$CARGO" != "$NEW" || "$TAURI" != "$NEW" ]]; then
            echo "Version mismatch!"
            echo "  package.json:    $PKG"
            echo "  Cargo.toml:      $CARGO"
            echo "  tauri.conf.json: $TAURI"
            exit 1
          fi
          echo "All files verified at $NEW"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"
          git push origin HEAD:${{ github.base_ref }}

  # ---------------------------------------------------------------------------
  # Path 2a: when a vX.Y[.Z] branch merges into main, compute the release tag
  # ---------------------------------------------------------------------------
  compute-release:
    name: Compute release tag
    if: >
      github.event.pull_request.merged == true &&
      github.base_ref == 'main' &&
      startsWith(github.event.pull_request.head.ref, 'v') &&
      contains(github.event.pull_request.head.ref, '.')
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      valid: ${{ steps.tag.outputs.valid }}

    steps:
      - name: Checkout main at the merge commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Resolve tag from current version
        id: tag
        run: |
          HEAD_REF="${{ github.event.pull_request.head.ref }}"
          # Accept vX.Y or vX.Y.Z integration branches
          if [[ ! "$HEAD_REF" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Head branch '$HEAD_REF' is not a vX.Y integration branch — skipping release."
            echo "valid=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION=$(grep -m1 '"version"' package.json | sed 's/.*"version": *"\([^"]*\)".*/\1/')
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::package.json version '$VERSION' is not X.Y.Z."
            echo "valid=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists. Bump the version on $HEAD_REF before merging to main."
            echo "valid=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "Releasing $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "valid=true" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Path 2b: hand off to the reusable Release workflow (build + attest + publish)
  # ---------------------------------------------------------------------------
  release:
    name: Build and publish release
    needs: compute-release
    if: needs.compute-release.outputs.valid == 'true'
    permissions:
      contents: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.compute-release.outputs.tag }}
      prerelease: ${{ contains(needs.compute-release.outputs.tag, '-') }}
    secrets: inherit
